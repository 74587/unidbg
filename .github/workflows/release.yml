name: Publish (Release + Docker Hub)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up latest Maven 3
        shell: bash
        run: |
          set -euo pipefail

          MAVEN_VERSION="$(
            curl -fsSL https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/maven-metadata.xml |
            python3 -c '
import sys
import xml.etree.ElementTree as ET

root = ET.parse(sys.stdin).getroot()
versions = []
for node in root.findall("./versioning/versions/version"):
    text = (node.text or "").strip()
    parts = text.split(".")
    if text.startswith("3.") and len(parts) == 3 and all(part.isdigit() for part in parts):
        versions.append(tuple(int(part) for part in parts))

if not versions:
    raise SystemExit("No stable Maven 3 release found")

print(".".join(str(part) for part in max(versions)))
'
          )"

          ARCHIVE="apache-maven-${MAVEN_VERSION}-bin.tar.gz"
          BASE_URL="https://dlcdn.apache.org/maven/maven-3/${MAVEN_VERSION}/binaries"
          CHECKSUM_URL="https://downloads.apache.org/maven/maven-3/${MAVEN_VERSION}/binaries/${ARCHIVE}.sha512"

          curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
          curl -fsSL "${CHECKSUM_URL}" -o "${RUNNER_TEMP}/${ARCHIVE}.sha512"

          echo "$(tr -d '[:space:]' < "${RUNNER_TEMP}/${ARCHIVE}.sha512")  ${RUNNER_TEMP}/${ARCHIVE}" | sha512sum -c -

          tar -xzf "${RUNNER_TEMP}/${ARCHIVE}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/apache-maven-${MAVEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify Maven version
        run: mvn -version

      - name: Build jar (Maven)
        run: mvn -DskipTests package

      - name: Generate checksums
        run: |
          sha256sum target/fqnovel.jar > target/fqnovel.jar.sha256

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            target/fqnovel.jar
            target/fqnovel.jar.sha256

      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/unidbg-fq
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push (Docker Hub)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker push skipped (missing secrets)
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "Docker Hub secrets not set; skip pushing image."
          echo "Set: Settings -> Secrets and variables -> Actions -> DOCKERHUB_USERNAME / DOCKERHUB_TOKEN"
